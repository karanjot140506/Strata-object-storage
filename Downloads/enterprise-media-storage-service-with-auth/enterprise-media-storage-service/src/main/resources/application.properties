spring.application.name=enterprise-storage-service

server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/storage_db

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# MinIO
app.storage.endpoint=http://localhost:9000
app.storage.access-key=admin
app.storage.secret-key=admin123
app.storage.region=us-east-1

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.webcom.storage=DEBUG

# JWT
# NOTE: this is a demo secret for local/dev use only. Replace with an env variable in production,
# e.g. app.jwt.secret=${JWT_SECRET}
app.jwt.secret=ZGVtby1zZWNyZXQta2V5LWZvci1lbnRlcnByaXNlLXN0b3JhZ2Utc2VydmljZS1qd3QtaG1hYy1zaGEyNTY=
app.jwt.expiration-ms=86400000